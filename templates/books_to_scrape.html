{% extends "base.html" %}

{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/books_to_scrape.css') }}">
<section class="table-section">
    <div class="container books-container">

        <div class="table-container glass-card">
            <div class="table-header text-center">
                <h2 class="books-title">Books To Scrape</h2>
            </div>

            <div class="table-scroll">
                <table class="styled-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Book Title</th>
                            <th>Price</th>
                            <th>Rating</th>
                            <th>Availability</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for book in books %}
                        <tr>
                            <td>{{ loop.index }}</td>
                            <td class="book-title-cell">{{ book.title }}</td>
                            <td>{{ book.price }}</td>
                            <td>
                                <span class="badge badge-{{ book.rating | lower }}">{{ book.rating }}</span>
                            </td>
                            <td>
                                <span class="badge badge-instock">{{ book.availability }}</span>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</section>
{% endblock %}
